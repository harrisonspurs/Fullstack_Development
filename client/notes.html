<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Notes - Student Study Helper</title>
    <link rel="stylesheet" href="/src/pages.css" />
  </head>
  <body>
    <main class="page">
      <h1>Notes</h1>
      <p>Add simple study notes here.</p>

      <section class="page-panel">
        <h2>Add Note</h2>
        <div class="row">
          <input id="note-input" type="text" placeholder="Type a note..." />
          <button id="add-note-button" type="button">Add Note</button>
        </div>
        <p id="note-message" class="message"></p>
      </section>

      <section class="page-panel">
        <h2>My Notes</h2>
        <ul id="notes-list" class="notes-list"></ul>
      </section>

      <a class="back-link" href="/index.html">Back to Dashboard</a>
    </main>
    <script type="module" src="/src/notes.js"></script>
  </body>
</html>
